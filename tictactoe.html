<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>井字棋</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  color: #e0e0e0; padding: 20px;
}

.container {
  width: 720px; max-width: 100%; padding: 26px 28px;
  background: rgba(255,255,255,0.05); border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

h1 {
  text-align: center; font-size: 1.75rem; letter-spacing: 6px; margin-bottom: 4px;
  background: linear-gradient(90deg, #e94560, #53d8fb);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.subtitle {
  text-align: center; font-size: 0.68rem; color: rgba(255,255,255,0.28);
  letter-spacing: 3px; margin-bottom: 18px;
}

/* ── AI 状态栏 ── */
.ai-status {
  display: flex; align-items: center; gap: 14px;
  background: rgba(255,255,255,0.05); border-radius: 12px;
  padding: 10px 16px; margin-bottom: 13px;
  border: 1px solid rgba(255,255,255,0.07);
}
.ai-stat { text-align: center; flex-shrink: 0; }
.ai-stat-label { font-size: 0.62rem; color: rgba(255,255,255,0.36); letter-spacing: 1px; margin-bottom: 3px; }
.ai-stat-value { font-size: 1rem; font-weight: bold; color: #53d8fb; }
.xp-wrap { flex: 1; }
.xp-bg { height: 5px; background: rgba(255,255,255,0.09); border-radius: 3px; overflow: hidden; }
.xp-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #53d8fb, #e94560); transition: width .6s; }
.xp-note { font-size: 0.59rem; color: rgba(255,255,255,0.27); margin-top: 2px; text-align: right; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.82rem; font-weight: bold; letter-spacing: 1px; }
.lv0 { background: rgba(150,150,150,.2); color: #aaa; }
.lv1 { background: rgba(76,175,80,.2);  color: #81c784; }
.lv2 { background: rgba(33,150,243,.2); color: #64b5f6; }
.lv3 { background: rgba(156,39,176,.2); color: #ce93d8; }
.lv4 { background: rgba(255,152,0,.2);  color: #ffb74d; }
.lv5 { background: rgba(233,45,96,.2);  color: #f06292; }

/* ── 先后手 ── */
.choose { margin-bottom: 13px; text-align: center; }
.choose-label { font-size: 0.7rem; color: rgba(255,255,255,0.4); letter-spacing: 1px; margin-bottom: 7px; }
.choose-btns { display: flex; gap: 10px; justify-content: center; }
.cbtn {
  flex: 1; max-width: 160px; padding: 7px 0;
  border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
  background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.48);
  cursor: pointer; font-size: 0.82rem; letter-spacing: 1px; transition: all .2s;
}
.cbtn:hover { background: rgba(255,255,255,0.09); color: #fff; }
.cbtn.active { background: rgba(83,216,251,0.15); border-color: #53d8fb; color: #53d8fb; }

/* ── 主区域：棋盘 + 思考面板 ── */
.game-area { display: flex; gap: 16px; margin-bottom: 13px; align-items: flex-start; }

/* ── 棋盘（固定尺寸，永不变形）── */
.board {
  display: grid;
  grid-template-columns: repeat(3, 90px);
  grid-template-rows: repeat(3, 90px);
  gap: 8px;
  flex-shrink: 0;
}
.cell {
  width: 90px; height: 90px;
  background: rgba(255,255,255,0.06); border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative; overflow: hidden;
  transition: background .18s, border-color .18s, transform .15s, box-shadow .2s;
  user-select: none; flex-shrink: 0;
}
.cell:hover:not(.taken):not(.ai-turn) {
  background: rgba(83,216,251,0.1);
  border-color: rgba(83,216,251,0.3);
  transform: scale(1.04);
}
.cell.taken, .cell.ai-turn { cursor: default; }

/* 棋子符号（绝对定位，不撑大格子）*/
.cell-mark {
  font-size: 2.4rem; line-height: 1;
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(1);
  animation: pop .22s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
}
.cell.X .cell-mark { color: #e94560; }
.cell.O .cell-mark { color: #53d8fb; }
@keyframes pop {
  from { transform: translate(-50%,-50%) scale(0) rotate(-20deg); opacity: 0; }
  to   { transform: translate(-50%,-50%) scale(1) rotate(0); opacity: 1; }
}

.cell.win-cell { animation: winPulse .65s ease infinite alternate; }
@keyframes winPulse {
  from { transform: scale(1);    box-shadow: 0 0 6px rgba(255,215,0,.25); }
  to   { transform: scale(1.07); box-shadow: 0 0 18px rgba(255,215,0,.65); border-color: rgba(255,215,0,.75); }
}

/* 胜率叠加层（绝对定位，不撑大格子）*/
.rate-ov {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  animation: fadeIn .2s ease; pointer-events: none; z-index: 2;
}
.rate-pct { font-size: 1.2rem; font-weight: bold; line-height: 1; }
.rate-lbl { font-size: 0.56rem; opacity: .6; margin-top: 4px; letter-spacing: 1px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ── 思考面板 ── */
.think-panel {
  flex: 1;
  background: rgba(0,0,0,0.22); border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.06); padding: 13px;
  height: 286px; display: flex; flex-direction: column; overflow: hidden;
}
.tp-title {
  font-size: 0.68rem; color: rgba(255,255,255,0.36); letter-spacing: 2px;
  padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 8px; flex-shrink: 0;
}
.tp-log {
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column; gap: 3px;
}
.tp-log::-webkit-scrollbar { width: 2px; }
.tp-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 1px; }

/* 思考面板条目 */
.tpe { font-size: 0.71rem; animation: slideIn .22s ease; }
.tpe.info { color: rgba(255,255,255,0.33); font-style: italic; }
.tpe.scan { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
.tpe.conclude { color: #53d8fb; font-weight: bold; padding: 3px 0; margin-top: 2px; }
.tpe.updated {
  color: #ffd700; font-weight: bold; padding: 6px 8px; margin-top: 5px;
  background: rgba(255,215,0,0.08); border-radius: 6px;
  border: 1px solid rgba(255,215,0,0.22);
  animation: updatedPop .4s ease;
}
@keyframes updatedPop {
  from { transform: scale(0.92); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}
.tp-cname { flex-shrink: 0; width: 36px; color: rgba(255,255,255,0.52); font-size: 0.69rem; }
.tp-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
.tp-fill { height: 100%; border-radius: 2px; }
.tp-num { flex-shrink: 0; width: 36px; text-align: right; font-size: 0.69rem; font-weight: bold; }
@keyframes slideIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }

/* ── 状态栏 ── */
.status-bar {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  height: 29px; margin-bottom: 11px; font-size: 0.87rem;
}
.s-icon { font-size: 1.05rem; }
.s-text { color: rgba(255,255,255,0.7); letter-spacing: 1px; }
.s-blink { color: #53d8fb; animation: blink .85s step-start infinite; }
@keyframes blink { 50% { opacity: .22; } }

/* ── 分数 ── */
.score-bar { display: flex; justify-content: space-around; margin-bottom: 13px; text-align: center; }
.s-who { font-size: 0.63rem; color: rgba(255,255,255,0.34); letter-spacing: 1px; margin-bottom: 1px; }
.s-num { font-size: 1.4rem; font-weight: bold; }
.s-player .s-num { color: #e94560; }
.s-ai     .s-num { color: #53d8fb; }
.s-draw   .s-num { color: rgba(255,255,255,0.4); }

/* ── 按钮 ── */
.btn-row { display: flex; gap: 10px; }
.btn { flex: 1; padding: 10px 0; border: none; border-radius: 10px; font-size: 0.86rem; letter-spacing: 2px; cursor: pointer; transition: all .2s; font-weight: bold; }
.btn-p { background: linear-gradient(135deg, #e94560, #c0392b); color: #fff; box-shadow: 0 4px 14px rgba(233,69,96,.35); }
.btn-p:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(233,69,96,.45); }
.btn-s { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.48); border: 1px solid rgba(255,255,255,0.09); }
.btn-s:hover { background: rgba(255,255,255,0.11); color: #fff; }

/* ── 对话框 ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); align-items: center; justify-content: center; z-index: 100; }
.overlay.show { display: flex; }
.dlg {
  background: #16213e; border: 1px solid rgba(255,255,255,0.11); border-radius: 18px;
  padding: 28px 30px; text-align: center; min-width: 240px;
  box-shadow: 0 20px 60px rgba(0,0,0,.6); animation: dlgPop .28s ease;
}
@keyframes dlgPop { from { transform: scale(.88) translateY(18px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.dlg-emoji { font-size: 2.7rem; margin-bottom: 10px; }
.dlg-title { font-size: 1.25rem; font-weight: bold; margin-bottom: 5px; }
.dlg-sub   { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-bottom: 14px; letter-spacing: 1px; }
.dlg-lvup  { background: rgba(255,215,0,.09); border: 1px solid rgba(255,215,0,.25); border-radius: 8px; padding: 7px 12px; margin-bottom: 14px; font-size: 0.8rem; color: #ffd700; }
.dlg-btns  { display: flex; gap: 10px; }
</style>
</head>
<body>
<div class="container">
  <h1>井字棋</h1>
  <p class="subtitle">TIC · TAC · TOE</p>

  <div class="ai-status">
    <div class="ai-stat">
      <div class="ai-stat-label">练习局数</div>
      <div class="ai-stat-value" id="gamesCount">0</div>
    </div>
    <div class="xp-wrap">
      <div class="xp-bg"><div class="xp-fill" id="xpBar" style="width:0%"></div></div>
      <div class="xp-note" id="xpNote">0 / 5</div>
    </div>
    <div class="ai-stat">
      <div class="ai-stat-label">熟练度</div>
      <div id="profBadge" class="badge lv0">萌新</div>
    </div>
  </div>

  <div class="choose">
    <div class="choose-label">选择先后手</div>
    <div class="choose-btns">
      <button class="cbtn active" id="btnFirst"  onclick="setOrder('first')">我先手 ✊</button>
      <button class="cbtn"        id="btnSecond" onclick="setOrder('second')">我后手 🤖</button>
    </div>
  </div>

  <div class="game-area">
    <div class="board" id="board"></div>
    <div class="think-panel">
      <div class="tp-title">🤖 电脑思考过程</div>
      <div class="tp-log" id="tpLog">
        <div class="tpe info">等待电脑落子...</div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span class="s-icon" id="sIcon">🎮</span>
    <span class="s-text" id="sText">请落子</span>
  </div>

  <div class="score-bar">
    <div class="s-player"><div class="s-who">玩家</div><div class="s-num" id="scoreP">0</div></div>
    <div class="s-draw">  <div class="s-who">平局</div><div class="s-num" id="scoreD">0</div></div>
    <div class="s-ai">    <div class="s-who">电脑</div><div class="s-num" id="scoreA">0</div></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-s" onclick="resetScores()">清空分数</button>
    <button class="btn btn-p" onclick="newGame()">新局 ▶</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="dlg">
    <div class="dlg-emoji" id="dlgE"></div>
    <div class="dlg-title" id="dlgT"></div>
    <div class="dlg-sub"   id="dlgS"></div>
    <div class="dlg-lvup"  id="dlgLv" style="display:none"></div>
    <div class="dlg-btns">
      <button class="btn btn-s" style="flex:1" onclick="closeDialog()">关闭</button>
      <button class="btn btn-p" style="flex:1" onclick="newGame()">再来一局</button>
    </div>
  </div>
</div>

<script>
// ── 持久化 ──
const STORE = 'ttt_stats_v2';
function loadStats() {
  try { const d = JSON.parse(localStorage.getItem(STORE)); return (d?.games >= 0) ? d : {games:0}; }
  catch { return {games:0}; }
}
function saveStats(s) { localStorage.setItem(STORE, JSON.stringify(s)); }

// ── 熟练度等级 ──
const LEVELS = [
  {name:'萌新', cls:'lv0', min:0,   max:5},
  {name:'见习', cls:'lv1', min:5,   max:15},
  {name:'熟练', cls:'lv2', min:15,  max:30},
  {name:'精通', cls:'lv3', min:30,  max:60},
  {name:'大师', cls:'lv4', min:60,  max:100},
  {name:'传说', cls:'lv5', min:100, max:Infinity},
];
function getLvIdx(g) {
  for (let i = LEVELS.length-1; i >= 0; i--) if (g >= LEVELS[i].min) return i;
  return 0;
}
function refreshAIStatus(g) {
  const li = getLvIdx(g), lv = LEVELS[li], nx = LEVELS[li+1];
  document.getElementById('gamesCount').textContent = g;
  const b = document.getElementById('profBadge');
  b.textContent = lv.name; b.className = 'badge ' + lv.cls;
  const fill = document.getElementById('xpBar'), note = document.getElementById('xpNote');
  if (nx) {
    const p = g - lv.min, s = lv.max - lv.min;
    fill.style.width = Math.min(100, Math.round(p/s*100)) + '%';
    note.textContent = `${p} / ${s}`;
  } else { fill.style.width = '100%'; note.textContent = '已满级'; }
}

// ── 格子名称（用于思考面板）──
const CNAMES = ['左上','上方','右上','左侧','中间','右侧','左下','下方','右下'];

// ── 游戏状态 ──
let board = Array(9).fill(null);
let pSym = 'X', aSym = 'O';
let turn  = 'player';
let over  = false;
let playerFirst = true;
let gid   = 0;          // 用于取消旧异步操作
let scores = {p:0, a:0, d:0};
let stats  = loadStats();

const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

// ── 渲染棋盘 ──
function renderBoard(winCells = []) {
  const el = document.getElementById('board');
  el.innerHTML = '';
  board.forEach((v, i) => {
    const c = document.createElement('div');
    c.className = 'cell'
      + (v ? ' taken ' + v : '')
      + (winCells.includes(i) ? ' win-cell' : '')
      + (!over && turn === 'ai' ? ' ai-turn' : '');
    if (v) {
      const m = document.createElement('span');
      m.className = 'cell-mark';
      m.textContent = v === 'X' ? '✕' : '○';
      c.appendChild(m);
    }
    c.addEventListener('click', () => onCellClick(i));
    el.appendChild(c);
  });
}
const getCells = () => document.querySelectorAll('#board .cell');

function setStatus(icon, text, blink = false) {
  document.getElementById('sIcon').textContent = icon;
  const el = document.getElementById('sText');
  el.textContent = text;
  el.className = 's-text' + (blink ? ' s-blink' : '');
}
function refreshScores() {
  document.getElementById('scoreP').textContent = scores.p;
  document.getElementById('scoreA').textContent = scores.a;
  document.getElementById('scoreD').textContent = scores.d;
}

// ── 思考面板工具 ──
function clearTP() { document.getElementById('tpLog').innerHTML = ''; }
function addTPRaw(html) {
  const log = document.getElementById('tpLog');
  log.insertAdjacentHTML('beforeend', html);
  log.scrollTop = log.scrollHeight;
}
function addTPInfo(t)    { addTPRaw(`<div class="tpe info">${t}</div>`); }
function addTPConclude(t){ addTPRaw(`<div class="tpe conclude">${t}</div>`); }
function addTPUpdated()  { addTPRaw(`<div class="tpe updated">✓ 已更新落子胜率</div>`); }
function addTPScan(name, rate) {
  const hue = Math.round(rate * 1.2);
  addTPRaw(`
    <div class="tpe scan">
      <span class="tp-cname">${name}</span>
      <div class="tp-bar">
        <div class="tp-fill" style="width:${rate}%;background:hsl(${hue},70%,44%)"></div>
      </div>
      <span class="tp-num" style="color:hsl(${hue},70%,58%)">${rate}%</span>
    </div>`);
}

// ── 胜率映射（minimax 分 -10~+10 → 0~100%）──
function scoreToRate(s) { return Math.round(((s + 10) / 20) * 100); }

// ── 在格子上显示胜率 ──
function showRate(idx, rate) {
  const cs = getCells();
  const c = cs[idx];
  if (!c || c.classList.contains('taken')) return;
  const hue   = Math.round(rate * 1.2);
  const alpha = 0.18 + Math.abs(rate - 50) / 50 * 0.38;
  c.style.background   = `hsla(${hue},75%,27%,${alpha})`;
  c.style.borderColor  = `hsla(${hue},75%,50%,${alpha + 0.2})`;
  const ov = document.createElement('div');
  ov.className = 'rate-ov';
  ov.innerHTML = `
    <span class="rate-pct" style="color:hsl(${hue},82%,64%)">${rate}%</span>
    <span class="rate-lbl" style="color:hsl(${hue},60%,52%)">胜率</span>`;
  c.appendChild(ov);
}
function highlightBest(idx) {
  const c = getCells()[idx];
  if (!c) return;
  c.style.transform   = 'scale(1.08)';
  c.style.boxShadow   = '0 0 18px rgba(83,216,251,0.6)';
  c.style.borderColor = 'rgba(83,216,251,0.85)';
}

// ── 延迟 ──
const delay = ms => new Promise(r => setTimeout(r, ms));

// ── 先后手切换 ──
function setOrder(o) {
  playerFirst = (o === 'first');
  document.getElementById('btnFirst') .classList.toggle('active',  playerFirst);
  document.getElementById('btnSecond').classList.toggle('active', !playerFirst);
  newGame();
}

// ── 新局 ──
function newGame() {
  closeDialog();
  gid++;
  board = Array(9).fill(null);
  over  = false;
  clearTP();
  if (playerFirst) {
    pSym = 'X'; aSym = 'O'; turn = 'player';
    setStatus('🎮', '轮到你了，请落子');
    addTPInfo('等待玩家落子...');
    renderBoard();
  } else {
    pSym = 'O'; aSym = 'X'; turn = 'ai';
    setStatus('🤖', '电脑思考中...', true);
    renderBoard();
    const g = gid;
    setTimeout(() => runAI(g), 400);
  }
}

// ── 玩家落子 ──
function onCellClick(i) {
  if (over || turn !== 'player' || board[i]) return;
  board[i] = pSym;
  const r = checkWin();
  if (r) { renderBoard(); endGame(r); return; }
  turn = 'ai';
  setStatus('🤖', '电脑思考中...', true);
  renderBoard();
  const g = gid;
  setTimeout(() => runAI(g), 150);
}

// ── AI 落子（带思考动画）──
async function runAI(g) {
  if (over || g !== gid) return;

  const empty = board.map((v,i) => v === null ? i : null).filter(i => i !== null);
  if (!empty.length) return;

  // 计算每个空格的 minimax 分数
  const rawScores = {}, rates = {};
  let bestS = -Infinity, bestM = empty[0];
  for (const i of empty) {
    board[i] = aSym;
    const s = minimax(0, false, -Infinity, Infinity);
    board[i] = null;
    rawScores[i] = s;
    rates[i] = scoreToRate(s);
    if (s > bestS) { bestS = s; bestM = i; }
  }

  // ── 思考动画：逐格展示胜率 ──
  clearTP();
  addTPInfo('开始分析每个落子位置...');

  for (const i of [...empty].sort((a,b) => a - b)) {
    await delay(260);
    if (g !== gid) return;
    showRate(i, rates[i]);
    addTPScan(CNAMES[i], rates[i]);
  }

  await delay(360);
  if (g !== gid) return;

  // 高亮最佳格子
  highlightBest(bestM);
  addTPConclude(`→ 选择${CNAMES[bestM]}（胜率 ${rates[bestM]}%）`);

  await delay(520);
  if (g !== gid) return;

  // 落子，重新渲染（自动清除胜率叠加层）
  board[bestM] = aSym;
  turn = 'player';
  renderBoard();

  const r = checkWin();
  if (r) { endGame(r); return; }
  setStatus('🎮', '轮到你了，请落子');
}

// ── 胜负判断 ──
function checkWin() {
  for (const [a,b,c] of WINS) {
    if (board[a] && board[a] === board[b] && board[b] === board[c])
      return { winner: board[a], line: [a,b,c] };
  }
  if (board.every(v => v)) return { winner: 'draw', line: [] };
  return null;
}

// ── 结局处理 ──
function endGame(r) {
  over = true;
  const oldLv = getLvIdx(stats.games);
  stats.games++;
  saveStats(stats);
  refreshAIStatus(stats.games);
  const newLv = getLvIdx(stats.games);

  renderBoard(r.line);
  addTPUpdated();   // "已更新落子胜率"

  let emoji, title, sub;
  if (r.winner === 'draw') {
    scores.d++; emoji = '🤝'; title = '平局！';    sub = '势均力敌';   setStatus('🤝', '平局！');
  } else if (r.winner === pSym) {
    scores.p++; emoji = '🏆'; title = '你赢了！';  sub = '厉害厉害～'; setStatus('🏆', '你赢了！');
  } else {
    scores.a++; emoji = '🤖'; title = '电脑赢了';  sub = '再接再厉！'; setStatus('😵', '电脑赢了！');
  }
  refreshScores();
  setTimeout(() => showDialog(emoji, title, sub, oldLv, newLv), 750);
}

// ── 弹窗 ──
function showDialog(emoji, title, sub, oldLv, newLv) {
  document.getElementById('dlgE').textContent = emoji;
  document.getElementById('dlgT').textContent = title;
  document.getElementById('dlgS').textContent = sub;
  const lv = document.getElementById('dlgLv');
  if (newLv > oldLv) {
    lv.style.display = '';
    lv.textContent = `🎉 熟练度提升：${LEVELS[oldLv].name} → ${LEVELS[newLv].name}`;
  } else { lv.style.display = 'none'; }
  document.getElementById('overlay').classList.add('show');
}
function closeDialog() { document.getElementById('overlay').classList.remove('show'); }

// ── Minimax + Alpha-Beta 剪枝 ──
function minimax(depth, isMax, alpha, beta) {
  const r = checkWin();
  if (r) {
    if (r.winner === aSym) return 10 - depth;
    if (r.winner === pSym) return depth - 10;
    return 0;
  }
  const emp = board.map((v,i) => v === null ? i : null).filter(i => i !== null);
  if (!emp.length) return 0;

  if (isMax) {
    let best = -Infinity;
    for (const i of emp) {
      board[i] = aSym;
      best = Math.max(best, minimax(depth+1, false, alpha, beta));
      board[i] = null;
      alpha = Math.max(alpha, best);
      if (beta <= alpha) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (const i of emp) {
      board[i] = pSym;
      best = Math.min(best, minimax(depth+1, true, alpha, beta));
      board[i] = null;
      beta = Math.min(beta, best);
      if (beta <= alpha) break;
    }
    return best;
  }
}

function resetScores() { scores = {p:0, a:0, d:0}; refreshScores(); }

// ── 初始化 ──
refreshAIStatus(stats.games);
refreshScores();
newGame();
</script>
