<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>井字棋</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  color: #333; padding: 20px;
}
.container {
  width: 880px; max-width: 100%; padding: 32px 36px;
  background: #fff; border-radius: 20px;
  border: 1px solid rgba(0,0,0,0.07);
  box-shadow: 0 8px 40px rgba(0,0,0,0.1);
}
h1 {
  text-align: center; font-size: 2.1rem; letter-spacing: 6px; margin-bottom: 4px;
  color: #333;
}
.subtitle {
  text-align: center; font-size: 0.78rem; color: rgba(0,0,0,0.3);
  letter-spacing: 3px; margin-bottom: 18px;
}

/* 顶部信息行 */
.info-bar {
  display: flex; align-items: center;
  background: #f7f8fa; border-radius: 12px;
  padding: 11px 20px; margin-bottom: 18px;
  border: 1px solid rgba(0,0,0,0.07);
}
.info-label { font-size: 0.78rem; color: rgba(0,0,0,0.4); letter-spacing: 1px; white-space: nowrap; }
.info-sep { width: 1px; height: 28px; background: rgba(0,0,0,0.1); margin: 0 18px; flex-shrink: 0; }
.spacer { flex: 1; }
.sess-set { display: flex; align-items: center; gap: 10px; }
.prac-input {
  width: 72px; padding: 4px 8px;
  background: #fff; border: 1px solid rgba(0,0,0,0.15);
  border-radius: 7px; color: #1a9bbf; font-size: 1rem; text-align: center; outline: none;
}
.prac-input:focus { border-color: #1a9bbf; }
.badge {
  display: inline-block; padding: 4px 12px; border-radius: 20px;
  font-size: 0.9rem; font-weight: bold; letter-spacing: 1px;
}
.lv0{background:rgba(150,150,150,.15);color:#888}
.lv1{background:rgba(76,175,80,.15);color:#388e3c}
.lv2{background:rgba(33,150,243,.15);color:#1976d2}
.lv3{background:rgba(156,39,176,.15);color:#7b1fa2}
.lv4{background:rgba(255,152,0,.15);color:#e65100}
.lv5{background:rgba(233,45,96,.15);color:#c2185b}

/* 先后手按钮 */
.order-btns { display: flex; gap: 8px; }
.cbtn {
  padding: 6px 18px;
  border: 1px solid rgba(0,0,0,0.12); border-radius: 8px;
  background: #fff; color: rgba(0,0,0,0.45);
  cursor: pointer; font-size: 0.9rem; letter-spacing: 1px; transition: all .2s; white-space: nowrap;
}
.cbtn:hover { background: #f0f2f5; color: #333; }
.cbtn.active { background: rgba(26,155,191,0.1); border-color: #1a9bbf; color: #1a9bbf; }

/* 主区域 */
.game-area { display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start; }

/* 主棋盘 */
.board {
  display: grid;
  grid-template-columns: repeat(3, 114px);
  grid-template-rows: repeat(3, 114px);
  gap: 10px; flex-shrink: 0;
}
.cell {
  width: 114px; height: 114px;
  background: #f7f8fa; border-radius: 14px;
  border: 1px solid rgba(0,0,0,0.09);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative; overflow: hidden;
  transition: background .18s, border-color .18s, transform .15s;
  user-select: none; flex-shrink: 0;
}
.cell:hover:not(.taken):not(.ai-turn) {
  background: rgba(26,155,191,0.08); border-color: rgba(26,155,191,0.35); transform: scale(1.04);
}
.cell.taken, .cell.ai-turn { cursor: default; }
.cell-mark {
  line-height: 0; pointer-events: none;
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.cell-mark.new { animation: pop .22s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes pop {
  from { transform: translate(-50%,-50%) scale(0) rotate(-20deg); opacity: 0; }
  to   { transform: translate(-50%,-50%) scale(1) rotate(0deg);   opacity: 1; }
}
.cell.win-cell { animation: winPulse .65s ease infinite alternate; }
@keyframes winPulse {
  from { transform: scale(1);    border-color: rgba(220,170,0,.4); background: #fff; }
  to   { transform: scale(1.07); border-color: rgba(220,170,0,.9); background: rgba(255,215,0,.08); }
}
.cell.ai-chosen { animation: aiChosenFlash .5s ease forwards; }
@keyframes aiChosenFlash {
  0%   { border-color: rgba(0,0,0,0.09); }
  50%  { border-color: rgba(26,155,191,0.8); transform: scale(1.1); }
  100% { border-color: rgba(0,0,0,0.09); }
}

/* 思考面板 */
.think-panel {
  flex: 1; background: #f7f8fa; border-radius: 14px;
  border: 1px solid rgba(0,0,0,0.07); padding: 16px;
  height: 362px; display: flex; flex-direction: column; overflow: hidden;
}
.tp-title {
  font-size: 0.75rem; color: rgba(0,0,0,0.35); letter-spacing: 2px;
  padding-bottom: 10px; border-bottom: 1px solid rgba(0,0,0,0.07);
  margin-bottom: 12px; flex-shrink: 0;
}
.tp-body {
  flex: 1; display: flex; flex-direction: row; align-items: center;
  gap: 16px; overflow: hidden; min-height: 0;
}

/* 小棋盘：9个持久节点，不重建 */
.mini-board {
  display: grid;
  grid-template-columns: repeat(3, 70px);
  grid-template-rows: repeat(3, 70px);
  gap: 5px; flex-shrink: 0;
  margin-left: 12px;
}
.mc {
  width: 70px; height: 70px;
  background: #fff; border-radius: 9px;
  border: 1px solid rgba(0,0,0,0.09);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  transition: border-color .25s, background .25s;
}
.mc-mark {
  line-height: 0;
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none;
}
.mc-rate {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: absolute; inset: 0; pointer-events: none;
}
.mc-rate-num { font-size: 0.95rem; font-weight: bold; line-height: 1; color: rgba(0,0,0,0.4); }
.mc-rate-lbl { font-size: 0.48rem; opacity: .5; margin-top: 3px; letter-spacing: 1px; }
.mc.chosen {
  border-color: rgba(26,155,191,0.8);
  background: rgba(26,155,191,0.08);
}
.mc.win-mc {
  animation: winMini .65s ease infinite alternate;
}
@keyframes winMini {
  from { border-color: rgba(220,170,0,.4); }
  to   { border-color: rgba(220,170,0,.95); }
}

/* 右侧思考文字 */
#tpStatus {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: flex-start;
  overflow: hidden;
}
.tp-caption {
  font-size: 0.82rem; color: rgba(0,0,0,0.3); letter-spacing: 0.5px;
  font-family: 'Courier New', monospace; line-height: 1.9;
}
.tp-caption.active { color: #1a9bbf; }

/* loading */
.tp-loading {
  display: flex; flex-direction: column; align-items: flex-start; gap: 10px; width: 100%;
}
.tp-loading-log {
  font-family: 'Courier New', 'Consolas', monospace;
  font-size: 0.82rem; color: rgba(0,0,0,0.5);
  display: flex; flex-direction: column; gap: 6px;
}
.tp-log-line { opacity: 0; animation: lineIn .18s ease forwards; }
@keyframes lineIn { to { opacity: 1; } }
.tp-dots { display: flex; gap: 5px; }
.tp-dots span {
  width: 5px; height: 5px; border-radius: 50%; background: #1a9bbf;
  animation: dotB 1.2s ease infinite;
}
.tp-dots span:nth-child(2){animation-delay:.2s}
.tp-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotB{0%,80%,100%{opacity:.15;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}

/* 状态栏 */
.s-blink { animation: blink .85s step-start infinite; }
@keyframes blink { 50%{opacity:.22} }
@keyframes dlgPop { from{transform:scale(.88) translateY(18px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }

/* 弹窗内快捷按钮 */
.quick-btn {
  flex: 1; padding: 9px 0;
  border: 1px solid rgba(26,155,191,0.3); border-radius: 9px;
  background: rgba(26,155,191,0.06); color: rgba(26,155,191,0.8);
  cursor: pointer; font-size: 1rem; font-weight: bold; letter-spacing: 1px;
  transition: all .18s;
}
.quick-btn:hover { background: rgba(26,155,191,0.14); border-color: rgba(26,155,191,0.6); color: #1a9bbf; }
.quick-btn.sel { background: rgba(26,155,191,0.18); border-color: #1a9bbf; color: #1a9bbf; }
</style>
</head>
<body>
<div class="container">
  <h1>井字棋</h1>
  <p class="subtitle">TIC · TAC · TOE</p>

  <div class="info-bar">
    <div class="sess-set">
      <span class="info-label">🤖 AI已练习局数</span>
      <input type="number" id="pracInput" class="prac-input" min="0" max="999" value="0" oninput="onPracInput()">
      <span style="font-size:.78rem;color:rgba(0,0,0,0.35)">局</span>
    </div>
    <div class="info-sep"></div>
    <div class="sess-set">
      <span class="info-label">熟练度</span>
      <div style="width:80px;height:6px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden;margin-right:4px">
        <div id="expBar" style="height:100%;width:0%;border-radius:3px;transition:width .4s ease"></div>
      </div>
      <span id="profBadge" class="badge lv0">萌新</span>
    </div>
    <div class="spacer"></div>
    <div class="info-sep"></div>
    <div class="order-btns">
      <button class="cbtn active" id="btnFirst" onclick="setOrder('first')">先手</button>
      <button class="cbtn" id="btnSecond" onclick="setOrder('second')">后手</button>
    </div>
  </div>

  <div class="game-area">
    <div class="board" id="board"></div>
    <div class="think-panel">
      <div class="tp-title">🤖 AI思考过程</div>
      <div class="tp-body">
        <div class="mini-board" id="miniBoard"></div>
        <div id="tpStatus">
          <div class="tp-caption">等待电脑落子...</div>
        </div>
      </div>
    </div>
  </div>

  <div style="display:flex;align-items:center;justify-content:center;gap:7px;height:28px;font-size:.87rem">
    <span id="sIcon" style="font-size:1.05rem">🎮</span>
    <span id="sText" style="color:rgba(0,0,0,0.55);letter-spacing:1px">请落子</span>
  </div>
</div>

<!-- 首次访问：规则弹窗 -->
<div id="rulesOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;z-index:200">
  <div style="background:#fff;border:1px solid rgba(0,0,0,0.09);border-radius:18px;padding:36px 40px;text-align:center;max-width:340px;box-shadow:0 12px 48px rgba(0,0,0,.15);animation:dlgPop .28s ease">
    <div style="font-size:2rem;margin-bottom:10px">♟️</div>
    <div style="font-size:1.1rem;font-weight:bold;letter-spacing:2px;margin-bottom:14px;color:#333">训练你的井字棋AI</div>
    <div style="font-size:0.88rem;color:rgba(0,0,0,0.45);line-height:1.9;margin-bottom:24px">你和AI轮流下棋，连成三子即可获胜（横、竖、斜都可以）</div>
    <button onclick="startFirstGame()" style="width:100%;padding:12px 0;border:none;border-radius:10px;background:linear-gradient(135deg,#e94560,#c0392b);color:#fff;font-size:.88rem;letter-spacing:3px;cursor:pointer;font-weight:bold">开始游戏</button>
  </div>
</div>

<!-- 非首次：设置AI训练局数弹窗 -->
<div id="setupOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;z-index:200">
  <div style="background:#fff;border:1px solid rgba(0,0,0,0.09);border-radius:18px;padding:34px 40px;text-align:center;width:320px;box-shadow:0 12px 48px rgba(0,0,0,.15);animation:dlgPop .28s ease">
    <!-- 熟练度标签 -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span id="setupBadge" class="badge lv0" style="font-size:0.78rem">萌新</span>
      <span id="setupGamesLabel" style="font-size:0.72rem;color:rgba(0,0,0,0.35);font-family:'Courier New',monospace">AI练习局数 0 / 999</span>
    </div>
    <!-- 进度条 -->
    <div style="width:100%;height:8px;background:rgba(0,0,0,0.07);border-radius:4px;overflow:hidden;margin-bottom:20px">
      <div id="setupExpBar" style="height:100%;width:0%;border-radius:4px;transition:width .4s ease,background .4s ease"></div>
    </div>
    <!-- 训练区：固定高度，内容切换不影响弹窗大小 -->
    <div style="height:58px;margin-bottom:14px;display:flex;align-items:stretch">
      <button id="trainBtn" onclick="addTraining()" style="width:100%;padding:0;border:1px solid rgba(26,155,191,0.35);border-radius:10px;background:rgba(26,155,191,0.07);color:#1a9bbf;font-size:.88rem;letter-spacing:1px;cursor:pointer;font-weight:bold;transition:all .18s;display:flex;align-items:center;justify-content:center" onmouseover="if(!this.disabled)this.style.background='rgba(26,155,191,0.14)'" onmouseout="if(!this.disabled)this.style.background='rgba(26,155,191,0.07)'">点击帮 AI 加速学习</button>
      <div id="trainLimitMsg" style="display:none;width:100%;padding:0 16px;background:rgba(255,152,0,0.07);border:1px solid rgba(255,152,0,0.25);border-radius:10px;font-size:.82rem;color:#e65100;line-height:1.5;align-items:center;justify-content:center">练习差不多了，去看看 AI 有没有变强吧 💪</div>
    </div>
    <button onclick="startFromSetup()" style="width:100%;padding:12px 0;border:none;border-radius:10px;background:linear-gradient(135deg,#e94560,#c0392b);color:#fff;font-size:.88rem;letter-spacing:3px;cursor:pointer;font-weight:bold">开始游戏</button>
  </div>
</div>

<!-- 结算弹窗 -->
<div id="overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;z-index:100">
  <div style="background:#fff;border:1px solid rgba(0,0,0,0.09);border-radius:18px;padding:30px 36px;text-align:center;min-width:240px;max-width:310px;box-shadow:0 12px 48px rgba(0,0,0,.15);animation:dlgPop .28s ease">
    <div id="dlgE" style="font-size:2.8rem;margin-bottom:10px"></div>
    <div id="dlgT" style="font-size:1.35rem;font-weight:bold;margin-bottom:20px;letter-spacing:2px;color:#333"></div>
    <div id="dlgRecord" style="background:rgba(26,155,191,0.07);border:1px solid rgba(26,155,191,0.2);border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:.8rem;color:#1a9bbf;line-height:2.1;text-align:center"></div>
    <button onclick="afterGame()" style="width:100%;padding:12px 0;border:none;border-radius:10px;background:linear-gradient(135deg,#e94560,#c0392b);color:#fff;font-size:.86rem;letter-spacing:2px;cursor:pointer;font-weight:bold">再来一局</button>
  </div>
</div>

<script>
const STORE        = 'ttt_stats_v10';
const STORE_VISIT  = 'ttt_visited_v1';

function loadStats(){ try{ const d=JSON.parse(localStorage.getItem(STORE)); return d?.games>=0?d:{games:0}; }catch{ return{games:0}; } }
function saveStats(s){ localStorage.setItem(STORE,JSON.stringify(s)); }
function isFirstVisit(){ return true; } // 每次刷新都视为首次
function markVisited(){ /* no-op */ }

// ── 等级 & 实力曲线 ──
const LEVELS = [
  {name:'萌新', cls:'lv0', min:0},
  {name:'见习', cls:'lv1', min:20},
  {name:'熟练', cls:'lv2', min:100},
  {name:'精通', cls:'lv3', min:200},
  {name:'大师', cls:'lv4', min:500},
  {name:'传说', cls:'lv5', min:800},
];
function getLvIdx(g){ for(let i=LEVELS.length-1;i>=0;i--) if(g>=LEVELS[i].min) return i; return 0; }
const LV_COLORS = ['#aaa','#81c784','#64b5f6','#ce93d8','#ffb74d','#f06292'];
function refreshAIStatus(g){
  const b = document.getElementById('profBadge');
  const idx = getLvIdx(g);
  const lv = LEVELS[idx];
  b.textContent = lv.name; b.className = 'badge '+lv.cls;
  const pct = Math.min(100, g / 999 * 100);
  const bar = document.getElementById('expBar');
  bar.style.width = pct + '%';
  bar.style.background = LV_COLORS[idx];
}

function getStrength(){
  const g = stats.games;
  if(g < 20)  return 0;
  if(g < 100) return 0.05 + (g-20)/80   * 0.15;
  if(g < 200) return 0.20 + (g-100)/100 * 0.30;
  if(g < 500) return 0.50 + (g-200)/300 * 0.25;
  if(g < 800) return 0.75 + (g-500)/300 * 0.20;
  return Math.min(1, 0.95 + (g-800)/200 * 0.05);
}

const CNAMES = ['左上','上方','右上','左侧','中间','右侧','左下','下方','右下'];
const WINS   = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

let board=Array(9).fill(null);
let pSym='O', aSym='X', turn='player', over=false, playerFirst=true, gid=0;
let stats = loadStats();
let firstGamePlayed = false; // 本次页面加载后是否已完成过一局

// SVG棋子：统一线条粗细，视觉大小一致
function markSVG(sym, size){
  const sw = Math.round(size * 0.13); // 统一线宽
  if(sym === 'X'){
    const p = Math.round(size * 0.22);
    const q = size - p;
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block"><line x1="${p}" y1="${p}" x2="${q}" y2="${q}" stroke="#1a9bbf" stroke-width="${sw}" stroke-linecap="round"/><line x1="${q}" y1="${p}" x2="${p}" y2="${q}" stroke="#1a9bbf" stroke-width="${sw}" stroke-linecap="round"/></svg>`;
  } else {
    const cx = size / 2, r = Math.round(size * 0.31);
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block"><circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="#3aaa5e" stroke-width="${sw}"/></svg>`;
  }
}

// 保存最后一次AI思考状态，游戏结束后恢复用
let _lastSnap=null, _lastRates={}, _lastChosen=-1, _lastLines=['','','',''];

// ── 小棋盘：持久9格，差量更新，不重建DOM ──
function initMiniBoard(){
  const el = document.getElementById('miniBoard');
  el.innerHTML = '';
  for(let i=0;i<9;i++){
    const c = document.createElement('div');
    c.className = 'mc';
    el.appendChild(c);
  }
}

// 跟踪上次渲染状态，避免不必要的DOM修改
let _miniState = { boardSnap:null, rates:{}, chosenIdx:-1, winCells:[] };

function updateMiniFrom(boardState, rates, chosenIdx, winCells=[]){
  const cells = document.querySelectorAll('#miniBoard .mc');
  if(cells.length !== 9){ initMiniBoard(); updateMiniFrom(boardState,rates,chosenIdx,winCells); return; }

  boardState.forEach((v, i)=>{
    const c = cells[i];

    // 计算目标 className
    let cls = 'mc';
    if(v) cls += ' '+v;
    if(winCells.includes(i)) cls += ' win-mc';
    if(i === chosenIdx) cls += ' chosen';
    if(c.className !== cls) c.className = cls;

    // 计算目标内容（只在变化时写入）
    let newHTML = '';
    if(v){
      newHTML = `<span class="mc-mark">${markSVG(v,34)}</span>`;
    } else if(rates[i] !== undefined){
      const rate = rates[i];
      const hue  = Math.round((rate - 25) / 70 * 120); // 25%→红(0) 60%→黄(60) 95%→绿(120)
      newHTML = `<span class="mc-rate-num" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">${rate}%</span>`;
    }
    if(c.innerHTML !== newHTML) c.innerHTML = newHTML;
  });
}

function updateMini(rates={}, chosenIdx=-1, winCells=[]){
  updateMiniFrom([...board], rates, chosenIdx, winCells);
}

// ── 思考文字 ──
function tpSetStatus(html){
  const el = document.getElementById('tpStatus');
  if(el) el.innerHTML = html;
}
function appendLogLine(text){
  const log = document.getElementById('tpLog');
  if(!log) return;
  const d = document.createElement('div');
  d.className = 'tp-log-line'; d.textContent = text;
  log.appendChild(d);
}

// ── 主棋盘 ──
function renderBoard(winCells=[], newCell=-1){
  const el = document.getElementById('board'); el.innerHTML='';
  board.forEach((v,i)=>{
    const c = document.createElement('div');
    c.className = 'cell'+(v?' taken '+v:'')+(winCells.includes(i)?' win-cell':'')+(!over&&turn==='ai'?' ai-turn':'');
    if(v){ const m=document.createElement('span'); m.className='cell-mark'+(i===newCell?' new':''); m.innerHTML=markSVG(v,58); c.appendChild(m); }
    c.addEventListener('click',()=>onCellClick(i));
    el.appendChild(c);
  });
}
const getMainCells = ()=>document.querySelectorAll('#board .cell');

function setStatus(icon, text, blink=false){
  document.getElementById('sIcon').textContent = icon;
  const el = document.getElementById('sText');
  el.textContent = text; el.className = blink?'s-blink':'';
  el.style.color = blink?'#1a9bbf':'rgba(0,0,0,0.55)';
}

function onPracInput(){
  let v = parseInt(document.getElementById('pracInput').value);
  if(isNaN(v)||v<0) v=0;
  if(v>999){ v=999; document.getElementById('pracInput').value=999; }
  stats.games = v; saveStats(stats); refreshAIStatus(stats.games);
}

// ── 弹窗逻辑 ──

const TRAIN_FIRST_CAP = 499; // 首次加速上限：精通顶部
let trainUsedOnce = false;   // 是否已用过加速，用过后上限解除

function syncSetupDialog(){
  const g = stats.games;
  const idx = getLvIdx(g);
  const lv = LEVELS[idx];
  const pct = Math.min(100, g / 999 * 100);
  document.getElementById('setupBadge').textContent = lv.name;
  document.getElementById('setupBadge').className = 'badge '+lv.cls;
  document.getElementById('setupGamesLabel').textContent = 'AI练习局数 '+g+' / 999';
  const bar = document.getElementById('setupExpBar');
  bar.style.width = pct+'%';
  bar.style.background = LV_COLORS[idx];

  // 首次加速且已到精通才显示限制；用过一次后永远不限制
  const limited = !trainUsedOnce && g >= TRAIN_FIRST_CAP;
  document.getElementById('trainBtn').style.display      = limited ? 'none' : 'flex';
  document.getElementById('trainLimitMsg').style.display = limited ? 'flex' : 'none';
}

// 首次：显示规则
function showRules(){
  document.getElementById('rulesOverlay').style.display='flex';
}
function startFirstGame(){
  markVisited();
  document.getElementById('rulesOverlay').style.display='none';

  document.getElementById('pracInput').value = 0;

// 非首次：显示设置弹窗（第二次起加速无限制）
function showSetup(){
  document.getElementById('overlay').style.display='none';
  syncSetupDialog();
  document.getElementById('setupOverlay').style.display='flex';
}

// +50 训练，上限精通（200局）
function addTraining(){
  const cap = trainUsedOnce ? 999 : TRAIN_FIRST_CAP;
  stats.games = Math.min(cap, stats.games + 50);
  document.getElementById('pracInput').value = stats.games;
  saveStats(stats); refreshAIStatus(stats.games);
  syncSetupDialog();

function startFromSetup(){
  trainUsedOnce = true; // 离开设置弹窗后，下次加速无限制
  saveStats(stats);
  document.getElementById('setupOverlay').style.display='none';
  newGame();
}

// 结算后：再来一局 → 弹设置
function afterGame(){ showSetup(); }

// ── AI ──
function countThreats(sym){
  let n=0;
  for(const [a,b,c] of WINS){
    const v=[board[a],board[b],board[c]];
    if(v.filter(x=>x===sym).length===2 && v.includes(null)) n++;
  }
  return n;
}

// 统一计算胜率和落子：
// 胜率 = minimax真实分 × 熟练度 + 随机噪声 × (1-熟练度)
// AI 永远选胜率最高的格子 → 低熟练度时算不准所以"选错"，高熟练度时接近最优
function calcMovePlan(empty){
  const ri = (lo,hi) => lo + Math.floor(Math.random()*(hi-lo+1));
  const str = getStrength();

  // 1. minimax 真实分数 → 标准化到 20-95%
  const scores = {};
  for(const i of empty){
    board[i] = aSym;
    scores[i] = minimax(0, false, -Infinity, Infinity);
    board[i] = null;
  }

  // 2. 按熟练度混合：真实分 vs 随机噪声
  const rates = {};
  for(const i of empty){
    const truePct  = Math.round(52 + scores[i] * 4.3); // minimax真实胜率
    const noisePct = ri(25, 90);                        // 完全随机
    let pct = Math.round(truePct * str + noisePct * (1 - str));
    pct += ri(-3, 3); // 微小抖动让数字自然
    rates[i] = Math.max(20, Math.min(95, pct));
  }

  // 3. AI 永远选胜率最高的格子
  let bestRate = -Infinity, actualMove = empty[0];
  for(const i of empty){
    if(rates[i] > bestRate){ bestRate = rates[i]; actualMove = i; }
  }

  return { rates, actualMove };
}

const delay = ms=>new Promise(r=>setTimeout(r,ms));

function setOrder(o){
  playerFirst=(o==='first');
  document.getElementById('btnFirst').classList.toggle('active',playerFirst);
  document.getElementById('btnSecond').classList.toggle('active',!playerFirst);
  newGame();
}

function newGame(){
  document.getElementById('overlay').style.display='none';
  gid++; board=Array(9).fill(null); over=false;
  renderBoard(); updateMini();
  if(playerFirst){
    pSym='O'; aSym='X'; turn='player';
    setStatus('🎮','轮到你了，请落子');
    tpSetStatus(`<div class="tp-caption">等待玩家落子...</div>`);
  } else {
    pSym='X'; aSym='O'; turn='ai';
    setStatus('🤖','电脑思考中...',true);
    tpSetStatus(`<div class="tp-caption">等待电脑落子...</div>`);
    const g=gid; setTimeout(()=>runAI(g),400);
  }
}

function onCellClick(i){
  if(over||turn!=='player'||board[i]) return;
  board[i]=pSym;
  updateMini();
  const r=checkWin(); if(r){ endGame(r,i); return; }
  turn='ai'; setStatus('🤖','电脑思考中...',true);
  renderBoard([],i);
  const g=gid; setTimeout(()=>runAI(g),150);
}

async function runAI(g){
  if(over||g!==gid) return;
  const empty = board.map((v,i)=>v===null?i:null).filter(i=>i!==null);
  if(!empty.length) return;

  const { rates, actualMove } = calcMovePlan(empty);
  const snap = [...board]; // 落子前快照
  const str = getStrength();

  // 拟人化文案池，按实力分两套语气
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];
  const msgs1 = str < 0.4
    ? ['这里...那里...哪里好呢 🤔','嗯，好好想想...','让我看看现在的局面...','有点难选诶...']
    : ['扫描棋盘中...','认真观察局面...','好，先看清形势...','冷静分析一下...'];
  const msgs2 = str < 0.4
    ? ['每个位置都试一试...','感觉哪里赢的概率大？','猜猜哪里比较好...','随机应变吧...']
    : ['计算每格得分...','评估所有落点...','精确计算胜率中...','推演各种可能...'];
  const msgs3 = str < 0.4
    ? ['就...这里吧！','感觉这格还行 😅','不管了，选这里！','赌一把，这里！']
    : ['锁定最优落点 ✓','决策完成！','这里胜算最高 →','已确认最佳位置'];
  const finalMsg = str < 0.4
    ? `试试${CNAMES[actualMove]}，希望没选错 😬`
    : `落子${CNAMES[actualMove]}（胜率 ${rates[actualMove]}%）`;

  // 预先取好随机文案，后续复用
  const t1 = pick(msgs1), t2 = pick(msgs2), t3 = pick(msgs3);
  const thinkHTML = () => `<div class="tp-loading-log" style="gap:7px;padding:2px 0">
    <div class="tp-log-line" style="animation-delay:0s">${t1}</div>
    <div class="tp-log-line" style="animation-delay:.7s">${t2}</div>
    <div class="tp-log-line" style="animation-delay:1.4s">${t3}</div>
    <div class="tp-log-line" style="animation-delay:2.1s;margin-top:14px;color:rgba(0,0,0,0.5);font-weight:bold">→ ${finalMsg}</div>
  </div>`;

  // 保存本次思考状态，供游戏结束后恢复
  _lastSnap = snap; _lastRates = rates; _lastChosen = -1;
  _lastLines = [t1, t2, t3, finalMsg];

  // 第1行：仅棋盘；第2行（700ms）：同步显示胜率；最终决策（2100ms）：亮蓝框
  updateMiniFrom(snap, {}, -1);
  tpSetStatus(thinkHTML());
  setTimeout(() => { if(g===gid) updateMiniFrom(snap, rates, -1); }, 700);
  setTimeout(() => { if(g===gid){ updateMiniFrom(snap, rates, actualMove); _lastChosen = actualMove; } }, 2100);

  await delay(3200); if(g!==gid) return;

  // 大棋盘闪光
  const cells = getMainCells();
  cells[actualMove].classList.add('ai-chosen');
  await delay(500); if(g!==gid) return;

  // 落子
  board[actualMove]=aSym;
  const r=checkWin();
  if(r){ endGame(r,actualMove); return; }
  turn='player';
  renderBoard([],actualMove);
  // 小棋盘保持胜率+高亮常驻，文字保持不动（不重设，避免动画重播）
  updateMiniFrom(snap, rates, actualMove);
  setStatus('🎮','轮到你了，请落子');
}

function checkWin(){
  for(const [a,b,c] of WINS)
    if(board[a]&&board[a]===board[b]&&board[b]===board[c]) return{winner:board[a],line:[a,b,c]};
  if(board.every(v=>v)) return{winner:'draw',line:[]};
  return null;
}

function endGame(r, lastCell=-1){
  over=true;
  stats.games++;
  document.getElementById('pracInput').value = stats.games;
  saveStats(stats); refreshAIStatus(stats.games);
  renderBoard(r.line,lastCell);

  let emoji, title;
  if(r.winner==='draw'){
    emoji='🤝'; title='平局';
    setStatus('🤝','平局！');
  } else if(r.winner===pSym){
    emoji='🏆'; title='你赢了';
    setStatus('🏆','你赢了！');
  } else {
    emoji='🤖'; title='AI 赢了';
    setStatus('😵','AI赢了！');
  }
  // 恢复最后一次AI思考界面，不显示胜负结果
  if(_lastSnap){
    updateMiniFrom(_lastSnap, _lastRates, _lastChosen);
    const [l1,l2,l3,lf] = _lastLines;
    tpSetStatus(`<div class="tp-loading-log" style="gap:7px;padding:2px 0">
      <div style="opacity:1">${l1}</div>
      <div style="opacity:1">${l2}</div>
      <div style="opacity:1">${l3}</div>
      <div style="opacity:1;margin-top:14px;color:rgba(0,0,0,0.5);font-weight:bold">→ ${lf}</div>
    </div>`);
  }
  const isFirst = !firstGamePlayed;
  firstGamePlayed = true;
  setTimeout(()=>{
    document.getElementById('dlgE').textContent = emoji;
    document.getElementById('dlgT').textContent = title;
    document.getElementById('dlgRecord').innerHTML = isFirst
      ? '现在AI还是个菜鸟，<br>通过训练让它变强吧！'
      : `训练局数 +1，AI已完成本局学习`;
    document.getElementById('overlay').style.display = 'flex';
  }, 800);
}

function minimax(depth,isMax,alpha,beta){
  const r=checkWin();
  if(r){ if(r.winner===aSym) return 10-depth; if(r.winner===pSym) return depth-10; return 0; }
  const emp=board.map((v,i)=>v===null?i:null).filter(i=>i!==null);
  if(!emp.length) return 0;
  if(isMax){
    let best=-Infinity;
    for(const i of emp){ board[i]=aSym; best=Math.max(best,minimax(depth+1,false,alpha,beta)); board[i]=null; alpha=Math.max(alpha,best); if(beta<=alpha)break; }
    return best;
  } else {
    let best=Infinity;
    for(const i of emp){ board[i]=pSym; best=Math.min(best,minimax(depth+1,true,alpha,beta)); board[i]=null; beta=Math.min(beta,best); if(beta<=alpha)break; }
    return best;
  }
}

// ── 初始化 ──
initMiniBoard();
refreshAIStatus(stats.games);
document.getElementById('pracInput').value = stats.games;

newGame(); // 先渲染棋盘，再覆盖弹窗

  showRules();
} else {

}
